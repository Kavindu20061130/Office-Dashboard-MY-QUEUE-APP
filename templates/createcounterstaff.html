<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin | Counter Staff Management</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/createcounterstaff.css') }}">
</head>

<body>
<div class="container">
  <h2>👥 Counter Staff & Queue Management</h2>
  <div id="toast" class="toast"></div>

  <div class="mode-bar">
    <span>📌 Operation mode:</span>
    <select id="modeSelect" onchange="toggleMode()">
      <option value="new">➕ Create new staff + counter</option>
      <option value="existing">✏️ Edit / delete existing staff</option>
    </select>
  </div>

  <div class="flex-row">
    <!-- NEW STAFF CARD -->
    <div class="card" id="newCard">
      <h3>➕ Register new counter staff</h3>

      <label>Username * (min 8 chars, globally unique)</label>
      <input type="text" id="newUsername" placeholder="e.g., john_doe_office" autocomplete="off">
      <div id="usernameAvailabilityMsg" class="feedback"></div>

      <label>Password * (8-18 chars, at least one number)</label>
      <input type="password" id="newPassword" placeholder="min 8 chars, include a digit" 
             oninput="checkNewPasswordStrength(); checkNewPasswordMatch()">
      <div id="newStrengthMsg" class="feedback"></div>

      <label>Confirm Password *</label>
      <input type="password" id="newConfirm" placeholder="re-enter password" oninput="checkNewPasswordMatch()">
      <div id="newMatchMsg" class="feedback"></div>

      <!-- Counter selection: existing OR new -->
      <label>Counter Assignment *</label>
      <div class="radio-group">
        <label><input type="radio" name="counterOption" value="existing" checked onchange="toggleCounterInputs('new')"> Select existing counter</label>
        <label><input type="radio" name="counterOption" value="new" onchange="toggleCounterInputs('new')"> Create new counter</label>
      </div>
      <div id="newExistingCounterDiv">
        <select id="newExistingCounter">
          <option value="">-- Choose an existing counter --</option>
          {% for c in counters %}
          <option value="{{c.id}}">{{c.name}} ({{c.status}})</option>
          {% endfor %}
        </select>
      </div>
      <div id="newNewCounterDiv" style="display:none;">
        <input type="text" id="newCounterName" placeholder="e.g., Counter 5 - Express">
      </div>

      <label>Assign to Queue (optional – can be done later)</label>
      <div style="display: flex; gap: 10px; align-items: center;">
        <select id="queueSelect" style="flex: 1;">
          <option value="">-- None / Assign later --</option>
          {% for q in queues %}
          <option value="{{q.id}}">{{q.name}} ({{q.status}})</option>
          {% endfor %}
        </select>
        <button type="button" class="small" onclick="document.getElementById('queueSelect').value='';" style="width: auto; margin-top: 0;">⏩ Skip for now</button>
      </div>

      <div class="tips">
        <b>💡 Rules:</b> Username ≥8 chars, unique across all offices. Password 8–18 chars, at least 1 digit.<br>
        <label style="display:flex; align-items:center; margin-top:12px; gap:10px;">
          <input type="checkbox" id="tipCheck" style="width:18px; margin:0;"> ✅ I confirm the details are correct
        </label>
      </div>

      <button class="primary" id="createBtn" onclick="createStaff()">✨ Create Staff & Counter</button>
    </div>

    <!-- EXISTING STAFF CARD -->
    <div class="card" id="existingCard" style="display:none;">
      <h3>✏️ Manage existing staff accounts</h3>
      <label>Select staff member</label>
      <select id="staffSelect" onchange="loadStaffDetails()">
        <option value="">-- Choose staff account --</option>
        {% for s in staff %}
        <option value="{{s.id}}" data-username="{{s.username}}" data-status="{{s.status}}" data-counter="{{s.counterId}}" data-queue="{{s.queueId}}">
          {{s.username}} ({{s.status}})
        </option>
        {% endfor %}
      </select>

      <div id="editPanel" style="display:none; margin-top:24px; background:#f9fafb; padding:22px; border-radius:20px;">
        <h4>✏️ Editing: <span id="editUsernameLabel" style="font-weight:700;"></span></h4>
        <label>Status</label>
        <select id="editStatus">
          <option value="active">🟢 Active</option>
          <option value="inactive">⚫ Inactive</option>
        </select>

        <label>Assign to Queue (optional – leave empty to unassign)</label>
        <div style="display: flex; gap: 10px; align-items: center;">
          <select id="editQueueSelect" style="flex: 1;">
            <option value="">-- None / Unassign --</option>
            {% for q in queues %}
            <option value="{{q.id}}">{{q.name}} ({{q.status}})</option>
            {% endfor %}
          </select>
          <button type="button" class="small" onclick="document.getElementById('editQueueSelect').value='';" style="width: auto; margin-top: 0;">❌ Unassign queue</button>
        </div>

        <label>Counter Assignment</label>
        <div class="radio-group">
          <label><input type="radio" name="editCounterOption" value="existing" checked onchange="toggleCounterInputs('edit')"> Assign existing counter</label>
          <label><input type="radio" name="editCounterOption" value="new" onchange="toggleCounterInputs('edit')"> Create & assign new counter</label>
        </div>
        <div id="editExistingCounterDiv">
          <select id="editExistingCounter">
            {% for c in counters %}
            <option value="{{c.id}}" data-name="{{c.name}}">{{c.name}}</option>
            {% endfor %}
          </select>
        </div>
        <div id="editNewCounterDiv" style="display:none;">
          <input type="text" id="editNewCounterName" placeholder="New counter name (e.g., Counter 7 - VIP)">
        </div>

        <div id="renameCounterBlock">
          <label>Rename currently assigned counter (optional)</label>
          <div class="inline-group">
            <input type="text" id="editCounterName" placeholder="New name for assigned counter">
            <button class="primary small" onclick="renameCounter()">✏️ Rename</button>
          </div>
        </div>

        <label>New Password (optional, leave blank to keep current)</label>
        <input type="password" id="editPassword" placeholder="8-18 chars, at least one number" 
               oninput="checkEditPasswordStrength(); checkEditPasswordMatch()">
        <div id="editStrengthMsg" class="feedback"></div>
        <label>Confirm new password</label>
        <input type="password" id="editConfirm" placeholder="confirm" oninput="checkEditPasswordMatch()">
        <div id="editMatchMsg" class="feedback"></div>

        <div style="display:flex; gap:14px; margin-top:24px;">
          <button class="primary" onclick="saveStaffChanges()" style="flex:2;">💾 Save changes</button>
          <button class="danger" onclick="deleteStaff()" style="flex:1;">🗑️ Delete staff</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="{{ url_for('static', filename='js/createcounterstaff.js') }}"></script>
</body>
</html>
